[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File /config/parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224

[FILTER]
    Name              parser
    Match             totemapi
    Key_Name          log
    Parser            json
    Reserve_Data      true

[FILTER]
    Name              record_modifier
    Match             totemapi
    Record            job totemapi
    Record            service TotemAPI

[FILTER]
    Name              record_modifier
    Match             file.totemapi
    Record            job totemapi_file
    Record            service TotemAPI

[FILTER]
    Name              modify
    Match             totemapi
    Condition         Key_does_not_exist tenant_id
    Add               tenant_id unknown

[FILTER]
    Name              modify
    Match             totemapi
    Condition         Key_value_equals tenant_id -
    Set               tenant_id unknown

[FILTER]
    Name              modify
    Match             file.totemapi
    Condition         Key_does_not_exist tenant_id
    Add               tenant_id unknown

[FILTER]
    Name              modify
    Match             file.totemapi
    Condition         Key_value_equals tenant_id -
    Set               tenant_id unknown

[FILTER]
    Name              record_modifier
    Match             *
    Record            job containers

[INPUT]
    Name              tail
    Path              /logs/totemapi.jsonl
    Tag               file.totemapi
    Parser            json
    Read_from_Head    true
    Refresh_Interval  5

[OUTPUT]
    Name              loki
    Match             totemapi
    Host              loki
    Port              3100
    labels            $job,$service
    tenant_id_key     tenant_id
    line_format       json

[OUTPUT]
    Name              loki
    Match             file.totemapi
    Host              loki
    Port              3100
    labels            $job,$service
    tenant_id_key     tenant_id
    line_format       json

[OUTPUT]
    Name              loki
    Match             *
    Host              loki
    Port              3100
    labels            $job
    line_format       json
