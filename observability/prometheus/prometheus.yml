global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: totemapi
    metrics_path: /metrics
    static_configs:
      - targets: ["totemapi:8080"]
