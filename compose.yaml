services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - ./observability/loki/runtime.yaml:/etc/loki/runtime.yaml:ro
      - ./data/loki:/loki
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:latest
    depends_on:
      - loki
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/config/fluent-bit.conf"]
    ports:
      - "24224:24224"
    healthcheck:
      test: [ "CMD", "/fluent-bit/bin/fluent-bit", "-V" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./logs:/logs
      - ./observability/fluent-bit:/config:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./observability/grafana/dashboards/totem:/etc/grafana/provisioning/dashboards/totem:ro
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: totem
      MYSQL_USER: totem
      MYSQL_PASSWORD: totem
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  totemapi:
    build:
      context: ./api/TotemAPI
      dockerfile: TotemAPI/Dockerfile
      args:
        APP_UID: "0"
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: Development
      Otel__Endpoint: http://jaeger:4317
      ConnectionStrings__MySql: Server=mysql;Port=3306;Database=totem;User=totem;Password=totem;
      S3__Bucket: totem-local-bucket
      S3__Region: us-east-1
      S3__AccessKey: test
      S3__SecretKey: test
      S3__ServiceUrl: http://localstack:4566
      S3__PublicBaseUrl: http://localhost:4566
      S3__ForcePathStyle: "true"
      Jwt__Issuer: TotemAPI
      Jwt__Audience: TotemClients
      Jwt__Key: super-secret-development-key-change-me
    ports:
      - "5120:8080"
    depends_on:
      jaeger:
        condition: service_started
        required: true
      fluent-bit:
        condition: service_healthy
        required: true
      mysql:
        condition: service_healthy
        required: true
      localstack:
        condition: service_started
        required: true
    logging:
      driver: fluentd
      options:
        fluentd-address: "127.0.0.1:24224"
        tag: "totemapi"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: rds,sqs,sns,s3
      AWS_DEFAULT_REGION: us-east-1
      EDGE_PORT: 4566
      PERSISTENCE: "1"
      DEBUG: "0"
    ports:
      - "4566:4566"
    volumes:
      - ./data/localstack:/var/lib/localstack
      - ./observability/localstack/init:/etc/localstack/init/ready.d:ro
    restart: unless-stopped

  admin-web:
    image: node:22-alpine
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5120
      NEXT_TELEMETRY_DISABLED: "1"
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"
    volumes:
      - ./admin-web:/app
      - admin_web_node_modules:/app/node_modules
    depends_on:
      totemapi:
        condition: service_started
        required: true
    restart: unless-stopped

volumes:
  admin_web_node_modules:
