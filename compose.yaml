services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - ./observability/loki/runtime.yaml:/etc/loki/runtime.yaml:ro
      - ./data/loki:/loki
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:latest
    depends_on:
      - loki
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/config/fluent-bit.conf"]
    ports:
      - "24224:24224"
    healthcheck:
      test: [ "CMD", "/fluent-bit/bin/fluent-bit", "-V" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./logs:/logs
      - ./observability/fluent-bit:/config:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./observability/grafana/dashboards/totem:/etc/grafana/provisioning/dashboards/totem:ro
    restart: unless-stopped

  totemapi:
    build:
      context: ./api/TotemAPI
      dockerfile: TotemAPI/Dockerfile
      args:
        APP_UID: "0"
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: Development
      Otel__Endpoint: http://jaeger:4317
      ConnectionStrings__LocalDb: Data Source=/data/totem.local.db
      Jwt__Issuer: TotemAPI
      Jwt__Audience: TotemClients
      Jwt__Key: super-secret-development-key-change-me
    ports:
      - "5120:8080"
    volumes:
      - ./data:/data
    depends_on:
      jaeger:
        condition: service_started
        required: true
      fluent-bit:
        condition: service_healthy
        required: true
    logging:
      driver: fluentd
      options:
        fluentd-address: "127.0.0.1:24224"
        tag: "totemapi"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
